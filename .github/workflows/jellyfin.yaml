name: Jellyfin CI

on:
  workflow_dispatch: {}

env:
  APP_NAME: jellyfin
  APP_VERSION: v10.11.6-202601182003
  APP_REPO: https://github.com/jellyfin/jellyfin-packaging
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.actor }}/jellyfin

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare app sources
        run: |
          git clone --branch ${{ env.APP_VERSION }} ${{ env.APP_REPO }} ${{ env.APP_NAME }}
          git submodule update --init
          patch ${{ env.APP_NAME }}/docker/Dockerfile .${{ env.APP_NAME }}/Dockerfile.patch

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v5
        with:
          platforms: linux/riscv64
          context: ${{ env.APP_NAME }}
          file: ${{ env.APP_NAME }}/docker/Dockerfile
          build-args:
            PACKAGE_ARCH: riscv64
            DOTNET_ARCH: riscv64
            IMAGE_ARCH: riscv64
            TARGET_ARCH: riscv64
            JELLYFIN_VERSION: ${{ env.APP_VERSION }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.APP_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
